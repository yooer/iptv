<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - IPTV 调度管理平台</title>
    <link rel="icon" href="/static/img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <link rel="stylesheet" href="/static/css/all.min.css">
    <script src="/static/js/crypto-js.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f5f7FA; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { width: 420px; background: #ffffff; padding: 50px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .logo-box { background-color: #10B981 !important; width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #ffffff; margin: 0 auto 30px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.15); }
        .input-group { background: #f8fafb; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; padding: 0 16px; margin-bottom: 20px; transition: all 0.2s; }
        .input-group:focus-within { border-color: #10B981; background: #ffffff; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08); }
        .input-field { border: none; background: transparent; padding: 14px 10px; width: 100%; outline: none; font-size: 14px; color: #334155; }
        .btn-primary { background-color: #10B981 !important; color: #ffffff !important; width: 100%; padding: 14px 0; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); font-size: 14px; margin-top: 10px; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(16, 185, 129, 0.25); }
        .label-text { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; padding-left: 2px; }
    </style>
</head>
<body>

    <div class="text-center">
        <div class="logo-box">
            <i class="fa-solid fa-bolt-lightning text-2xl"></i>
        </div>
        <h1 style="font-size: 24px; font-weight: 700; color: #1e293b; margin-bottom: 8px; letter-spacing: -0.02em;">IPTV 调度管理中心</h1>
        <p style="font-size: 13px; color: #64748b; margin-bottom: 40px;">可视化负载均衡与直播调度平台</p>

        <div class="login-card text-left">
            <label class="label-text">Administrator Email</label>
            <div class="input-group">
                <i class="fa-solid fa-envelope" style="color: #cbd5e1; font-size: 14px;"></i>
                <input type="email" id="mail" autocomplete="off" class="input-field" placeholder="管理员账号">
            </div>

            <label class="label-text">Security Password</label>
            <div class="input-group">
                <i class="fa-solid fa-lock" style="color: #cbd5e1; font-size: 14px;"></i>
                <input type="password" id="password" class="input-field" placeholder="访问密码">
            </div>

            <button onclick="doLogin()" id="login_btn" class="btn-primary">
                进入管理后台
            </button>
        </div>

        <p style="margin-top: 40px; color: #cbd5e1; font-size: 11px; font-weight: 500; letter-spacing: 0.05em;">
            &copy; 2026 IPTV 调度系统 · <span style="color: #94a3b8;">{{VERSION}}</span>
        </p>
    </div>

    <!-- Toast -->
    <div id="toast" style="position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); padding: 12px 24px; background: #1e293b; color: #fff; border-radius: 10px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 1000; display: flex; align-items: center; gap: 10px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
        <i id="toast_icon" class="fa-solid fa-circle-info" style="color: #10B981;"></i>
        <span id="toast_msg"></span>
    </div>

    <script>
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            const m = document.getElementById('toast_msg');
            const i = document.getElementById('toast_icon');
            m.innerText = msg;
            i.style.color = type === 'error' ? '#f87171' : '#10B981';
            t.style.transform = 'translateX(-50%) translateY(0)';
            t.style.opacity = '1';
            setTimeout(() => {
                t.style.transform = 'translateX(-50%) translateY(-100px)';
                t.style.opacity = '0';
            }, 3000);
        }

        async function doLogin() {
            const mail = document.getElementById('mail').value;
            const passwordRaw = document.getElementById('password').value;
            const btn = document.getElementById('login_btn');

            if (!mail || !passwordRaw) return showToast("请输入完整登录信息", "error");

            btn.disabled = true;
            btn.innerText = "正在验证...";

            // 前端 MD5 加密
            const passwordEnc = CryptoJS.MD5(passwordRaw).toString();

            try {
                const res = await fetch('/dash/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mail, password: passwordEnc })
                });
                const result = await res.json();
                if (result.status) {
                    showToast("认证成功，欢迎回来", "success");
                    localStorage.setItem('dreamId', result.token);
                    setTimeout(() => location.href = '/dash/api', 800);
                } else {
                    showToast(result.msg || "账号或密码错误", "error");
                    btn.disabled = false;
                    btn.innerText = "进入管理后台";
                }
            } catch (e) {
                showToast("网络通信异常", "error");
                btn.disabled = false;
                btn.innerText = "进入管理后台";
            }
        }

        // 页面加载时检测数据库连接状态
        async function checkDBStatus() {
            try {
                const res = await fetch('/dash/status', { headers: { 'dreamId': '' } });
                // status 接口需要鉴权，401 说明服务正常但未登录；200 说明有 token
                // 我们通过另一个方式检测：尝试登录接口的前置状态
            } catch(e) {}
            
            // 通过 POST 一个空登录请求来探测 DB 状态
            try {
                const res = await fetch('/dash/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mail: '', password: '' })
                });
                const result = await res.json();
                // 如果返回数据库异常的提示
                if (result.msg && result.msg.includes('数据库')) {
                    showDBWarning();
                }
            } catch(e) {}
        }

        function showDBWarning() {
            const card = document.querySelector('.login-card');
            const existing = document.getElementById('db_warning');
            if (existing) return;
            
            const warn = document.createElement('div');
            warn.id = 'db_warning';
            warn.style.cssText = 'margin-top:20px; padding:14px 16px; background:#fff7ed; border:1px solid #fed7aa; border-radius:12px; display:flex; align-items:center; justify-content:space-between; gap:12px;';
            warn.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;">
                    <span style="color:#f97316;font-size:16px;">⚠️</span>
                    <span style="font-size:13px;color:#9a3412;font-weight:500;">数据库连接异常</span>
                </div>
                <a href="/dash/setup-page" style="font-size:12px;font-weight:700;color:#ea580c;text-decoration:none;white-space:nowrap;padding:6px 14px;background:#ffedd5;border-radius:8px;border:1px solid #fed7aa;">
                    配置数据库 →
                </a>`;
            card.appendChild(warn);
        }

        checkDBStatus();
    </script>
</body>
</html>
